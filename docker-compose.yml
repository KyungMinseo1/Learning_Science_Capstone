version: "3.9"

services:
  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
    volumes:
      - neo4j_data:/data
    ports:
      - "7687:7687"   # bolt (외부 노출 필요 없으면 제거)
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD}", "RETURN 1"]
      interval: 10s
      retries: 5

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/build:/usr/share/nginx/html
    depends_on:
      - backend

  chroma:
    image: chromadb/chroma:latest
    volumes:
      - chroma_data:/chroma/.chroma
    ports:
      - "8001:8000"

  backend:
    build: .
    env_file: .env
    environment:
      NEO4J_URI: bolt://neo4j:7687   # 서비스명으로 참조
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
    depends_on:
      neo4j:
        condition: service_healthy
      chroma:
        condition: service_started
    ports:
      - "8000:8000"

volumes:
  neo4j_data:
  chroma_data: